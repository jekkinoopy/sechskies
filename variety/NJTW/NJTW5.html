<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新西遊記：成員介紹</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/tablet.css">
    <link rel="stylesheet" href="njtw5.css">
    <style>
        /* 本頁專用：.nickname 只寫在 HTML（依你要求，未再放到 njtw5.css） */
        body.njtw5-page .member-card .nickname {
            display: block;
            margin-top: 0.65rem;
            padding: 0.15rem 0;
            font-size: max(14px, 0.92rem);
            font-weight: 700;
            color: #3d240c;
            line-height: 1.5;
            word-break: break-word;
            overflow-wrap: anywhere;
            opacity: 1;
            visibility: visible;
            position: relative;
            z-index: 1;
        }

        .main-header {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
        }
    </style>
</head>

<body class="njtw5-page">
    <header class="main-header">
        <h1>新西遊記 5：與鬼神同行</h1>
        <p class="intro">
            這是一場驚心動魄（搞笑）的鬼怪盛宴！<br>
            六位成員化身世界各地的經典鬼怪，展開一場前往香港與北海道的爆笑冒險。
        </p>
    </header>
    <div class="container">
        <h2 class="section-title">鬼神介紹</h2>
        <!-- 第一排 -->
        <div class="member-card m1">
            <div class="member-image"></div>
            <div class="info">
                <div class="name">姜鎬童</div>
                <div class="role">無臉男 (鎬童臉)</div>
                <span class="nickname">#吃貨精靈 #低聲細語</span>
            </div>
        </div>

        <div class="member-card m2">
            <div class="member-image"></div>
            <div class="info">
                <div class="name">李壽根</div>
                <div class="role">恰吉</div>
                <span class="nickname">#最強短腿 #瘋狂跑動</span>
            </div>
        </div>

        <div class="member-card m3">
            <div class="member-image"></div>
            <div class="info">
                <div class="name">殷志源</div>
                <div class="role">陰間使者</div>
                <span class="nickname">#瘋子使者 #最帥鬼怪</span>
            </div>
        </div>

        <!-- 第二排 -->
        <div class="member-card m4">
            <div class="member-image"></div>
            <div class="info">
                <div class="name">安宰賢</div>
                <div class="role">殭屍 (新瘋)</div>
                <span class="nickname">#美男殭屍 #運動白痴</span>
            </div>
        </div>

        <div class="member-card m5">
            <div class="member-image"></div>
            <div class="info">
                <div class="name">宋旻浩</div>
                <div class="role">處女鬼</div>
                <span class="nickname">#長髮宋 #綜藝神降臨</span>
            </div>
        </div>

        <div class="member-card m6">
            <div class="member-image"></div>
            <div class="info">
                <div class="name">P.O</div>
                <div class="role">吸血鬼</div>
                <span class="nickname">#新弟子 #德古拉</span>
            </div>
        </div>
    </div>
    <!-- 影片區塊：將 iframe 的 src 換成 https://www.youtube.com/embed/你的影片ID -->
    <div class="video-container">
        <h2 class="video-title">經典片段回顧</h2>
        <div class="video-wrapper">
            <iframe class="video-embed" src="https://www.youtube.com/embed/3zSeN9Ss3BI?si=U_mA4NSbsI_m3ViY"
                title="新西遊記 5 精華片段" loading="lazy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
    </div>
</body>

</html>
